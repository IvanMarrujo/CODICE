version: "3.9"

# ============================================================
# CÓDICE — Local development stack
# PostgreSQL 16  →  localhost:5433
# Redis 7        →  localhost:6379
# pgAdmin 4      →  localhost:5050  (email: admin@codice.dev / pw: admin)
# ============================================================

services:

  postgres:
    image: postgres:16-alpine
    container_name: codice_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-codice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codice_dev_2024}
      POSTGRES_DB:       ${POSTGRES_DB:-codice_main}
    ports:
      - "5433:5432"
    volumes:
      - codice_pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d   # init scripts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codice}"]
      interval: 5s
      timeout:  5s
      retries:  5
    networks:
      - codice_net

  redis:
    image: redis:7-alpine
    container_name: codice_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-codice_redis_2024} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - codice_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-codice_redis_2024}", "ping"]
      interval: 5s
      timeout:  5s
      retries:  5
    networks:
      - codice_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: codice_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_DEFAULT_EMAIL:-admin@codice.dev}
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT:      5050
    ports:
      - "5050:5050"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - codice_net

volumes:
  codice_pgdata:
  codice_redis:

networks:
  codice_net:
    driver: bridge
